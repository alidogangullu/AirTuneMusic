<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connect to AirTune Music (TV)</title>
  <script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      color: #eee;
    }
    .card {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 32px;
      max-width: 400px;
      width: 100%;
    }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    .sub { color: #999; font-size: 0.9rem; margin-bottom: 24px; }
    label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: #bbb; }
    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 1.25rem;
      letter-spacing: 0.2em;
      text-align: center;
      border: 1px solid #444;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      margin-bottom: 20px;
    }
    input::placeholder { color: #666; }
    button {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #f0535b;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #d84b52; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .message.success { background: #1a3d1a; color: #8f8; display: block; }
    .message.error { background: #3d1a1a; color: #f88; display: block; }
    .message.info { background: #1a2a3d; color: #8cf; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Connect to TV</h1>
    <p class="sub">Enter the code shown on your Android TV to connect <span style="color: #f0535b; font-weight: 600;">AirTune Music</span> with your <span style="color: #f0535b; font-weight: 600;">Apple Music</span> account.</p>

    <form id="form" autocomplete="off">
      <label for="code">TV code</label>
      <input
        id="code"
        type="text"
        inputmode="numeric"
        pattern="[0-9-]*"
        maxlength="7"
        placeholder="000-000"
        autocomplete="one-time-code"
        required
      />
      <button type="submit" id="btn">Sign in with Apple Music</button>
    </form>

    <div id="message" class="message" role="alert"></div>
  </div>

  <script>
    (function () {
      // Base URL of your backend. Use '' for same origin, or e.g. 'https://api.example.com'
      const API_BASE = '';

      const form = document.getElementById('form');
      const codeInput = document.getElementById('code');
      const btn = document.getElementById('btn');
      const messageEl = document.getElementById('message');

      function showMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = 'message ' + type;
        messageEl.style.display = 'block';
      }

      function hideMessage() {
        messageEl.style.display = 'none';
      }

      codeInput.addEventListener('input', function (e) {
        if (e.inputType === 'deleteContentBackward') return;
        let val = e.target.value.replaceAll(/\D/g, '');
        if (val.length >= 3) {
          val = val.slice(0, 3) + '-' + val.slice(3, 6);
        }
        e.target.value = val;
      });

      async function getDeveloperToken() {
        const url = API_BASE ? API_BASE + '/api/tv-link/developer-token' : '/api/tv-link/developer-token';
        const res = await fetch(url);
        if (!res.ok) throw new Error('Could not get developer token');
        const data = await res.json();
        return data.developerToken;
      }

      async function sendTokenToBackend(code, musicUserToken) {
        const url = API_BASE ? API_BASE + '/api/tv-link' : '/api/tv-link';
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code.trim(), musicUserToken })
        });
        if (!res.ok) {
          let errMsg = 'Failed to link device';
          try {
            const errData = await res.json();
            if (errData.error) errMsg = errData.error;
          } catch { /* JSON parse failed, use default error message */ }
          throw new Error(errMsg);
        }
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        let code = codeInput.value.replaceAll(/\D/g, '').trim();
        if (!code || code.length !== 6) return;

        btn.disabled = true;
        hideMessage();

        try {
          const developerToken = await getDeveloperToken();
          if (!developerToken) throw new Error('Missing developer token');

          await MusicKit.configure({ developerToken });
          const music = MusicKit.getInstance();
          const musicUserToken = await music.authorize();
          if (!musicUserToken) throw new Error('No token returned');

          await sendTokenToBackend(code, musicUserToken);
          showMessage('Success! Your TV is now linked. You can close this page.', 'success');
          form.reset();
        } catch (err) {
          let msg = err.message || String(err);
          
          // If the error is about authorization, it's almost always a missing subscription
          if (msg.toLowerCase().includes('unauthorized') || msg.toLowerCase().includes('forbidden')) {
            msg = 'An active Apple Music subscription is required. Please check your account and try again.';
          }
          
          showMessage(msg, 'error');
        } finally {
          btn.disabled = false;
        }
      });

      // Auto-fill code from URL if present
      const urlParams = new URLSearchParams(window.location.search);
      const codeFromUrl = urlParams.get('code');
      if (codeFromUrl) {
        let cleanCode = codeFromUrl.replaceAll(/\D/g, '');
        if (cleanCode.length === 6) {
          codeInput.value = cleanCode.slice(0, 3) + '-' + cleanCode.slice(3, 6);
        }
      }
    })();
  </script>
</body>
</html>
